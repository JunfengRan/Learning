name: Validate Mermaid Diagrams

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "scripts/validate-mermaid.mjs"
      - "package.json"
      - ".github/workflows/validate-mermaid.yml"
  pull_request:
    paths:
      - "**.md"
      - "scripts/validate-mermaid.mjs"
      - "package.json"
      - ".github/workflows/validate-mermaid.yml"

jobs:
  mermaid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run validate:mermaid
